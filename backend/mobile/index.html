<!doctype html>
<html lang="en" data-theme="nova">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Kontexa</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" id="metaThemeColor" content="#f6f7f9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Kontexa" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link
      id="themeFont"
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="app">
      <div class="bg-deco"></div>

      <!-- ═══ TOPBAR ══════════════════════════════════════════ -->
      <header class="topbar">
        <div class="logo-wrap">
          <div class="logo-mark">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 12h6M9 16h6M7 8h10M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"
              />
            </svg>
          </div>
          <span class="logo-text">Kontexa</span>
        </div>
        <div class="tbbtns">
          <button class="ib" id="themeBtn" aria-label="Change theme">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2a10 10 0 000 20c1.1 0 2-.9 2-2 0-.5-.2-1-.5-1.4-.3-.4-.5-.8-.5-1.3 0-1.1.9-2 2-2h2.3a5.7 5.7 0 000-11.4C13.6 2.4 12 2 12 2z"
              />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <circle cx="12" cy="6" r="1.5" />
              <circle cx="15.5" cy="8.5" r="1.5" />
            </svg>
          </button>
          <button class="ib" id="acctBtn" aria-label="Account">
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </button>
          <button class="ib" id="menuBtn" aria-label="Browse notes">
            <svg viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="15" y2="12" />
              <line x1="3" y1="18" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </header>

      <!-- ═══ SEARCH ══════════════════════════════════════════ -->
      <div class="sbar">
        <div class="si" id="searchWrap">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="searchIn"
            placeholder="Search notes…"
            autocomplete="off"
            aria-label="Search notes"
          />
          <button class="sc" id="searchClr" aria-label="Clear search">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
      </div>

      <!-- ═══ MAIN SCROLL AREA ════════════════════════════════ -->
      <div class="ms" id="mainScr">
        <div class="view active" id="homeView">
          <div id="homeCnt">
            <div class="spin-wrap"><div class="spin"></div></div>
          </div>
        </div>
        <div class="view" id="pageView">
          <button class="bk" id="backBtn">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
            Back
          </button>
          <div id="pageCnt"></div>
        </div>
        <div class="view" id="noteView">
          <button class="bk" id="noteBackBtn">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
            Back
          </button>
          <div class="nd" id="noteDet"></div>
        </div>
        <div class="view" id="settingsView">
          <div class="sw" id="settingsCnt"></div>
        </div>
      </div>

      <!-- ═══ BOTTOM NAV ══════════════════════════════════════ -->
      <nav class="bnav">
        <div class="nt on" id="tab-notes" onclick="switchTab('notes')">
          <div class="nt-ico">
            <svg viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
          </div>
          <span>Notes</span>
        </div>
        <div class="nt" id="tab-ai" onclick="openAI()">
          <div class="nt-ico">
            <svg viewBox="0 0 24 24">
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
              />
            </svg>
          </div>
          <span>Ask AI</span>
        </div>
        <div class="nt" id="tab-settings" onclick="switchTab('settings')">
          <div class="nt-ico">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
              />
            </svg>
          </div>
          <span>Settings</span>
        </div>
      </nav>
    </div>

    <!-- ═══ DRAWER ══════════════════════════════════════════ -->
    <div class="drw-o" id="drwO" onclick="closeDrw()"></div>
    <nav class="drw" id="drw">
      <div class="drw-hd">
        <span class="drw-ttl">Browse Notes</span>
        <button class="drw-x" onclick="closeDrw()" aria-label="Close drawer">
          <svg viewBox="0 0 24 24" width="14" height="14">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="drw-sc" id="drwBdy">
        <div class="spin-wrap"><div class="spin"></div></div>
      </div>
    </nav>

    <!-- ═══ AI MODAL ═════════════════════════════════════════ -->
    <div class="mo" id="aiMo" onclick="if (event.target === this) closeAI();">
      <div class="ms2">
        <div class="pip"></div>
        <div class="shd">
          <div class="shd-left">
            <div class="shd-icon ai-icon">
              <svg viewBox="0 0 24 24" width="14" height="14">
                <path
                  d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                />
              </svg>
            </div>
            <span class="sttl">Ask AI</span>
          </div>
          <div class="sx" onclick="closeAI()" aria-label="Close">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="cbox" id="cbox">
          <div class="cm a">
            Hi! Ask me anything about your saved notes — summaries, comparisons,
            or finding something specific.
          </div>
        </div>
        <div class="crow">
          <textarea
            class="cin"
            id="cin"
            placeholder="Ask about your notes…"
            rows="1"
          ></textarea>
          <button class="csnd" id="csnd" aria-label="Send">
            <svg viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ API KEY MODAL ════════════════════════════════════ -->
    <div class="mo" id="apiMo" onclick="if (event.target === this) closeAPI();">
      <div class="ms2" style="max-height: 72vh">
        <div class="pip"></div>
        <div class="shd">
          <div class="shd-left">
            <div class="shd-icon key-icon">🔑</div>
            <span class="sttl">AI API Key</span>
          </div>
          <div class="sx" onclick="closeAPI()">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="aform">
          <div>
            <div class="albl">Provider</div>
            <div class="ptabs">
              <div class="ptab on" data-p="gemini" onclick="pickP(this)">
                Gemini
              </div>
              <div class="ptab" data-p="openai" onclick="pickP(this)">
                OpenAI
              </div>
              <div class="ptab" data-p="claude" onclick="pickP(this)">
                Claude
              </div>
            </div>
          </div>
          <div>
            <div class="albl">API Key</div>
            <input
              type="password"
              class="ain"
              id="apiKIn"
              placeholder="Paste your key here…"
            />
            <div class="ahint">
              Stored locally on this device only — never sent to our servers.
            </div>
          </div>
          <button class="asave" onclick="saveKey()">Save Key</button>
        </div>
      </div>
    </div>

    <!-- ═══ THEME MODAL ══════════════════════════════════════ -->
    <div
      class="mo"
      id="themeMo"
      onclick="if (event.target === this) closeTh();"
    >
      <div class="ms2" style="max-height: 60vh">
        <div class="pip"></div>
        <div class="shd">
          <div class="shd-left">
            <div class="shd-icon th-icon">🎨</div>
            <span class="sttl">Color Theme</span>
          </div>
          <div class="sx" onclick="closeTh()">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="tgrid" id="tgrid"></div>
      </div>
    </div>

    <!-- ═══ ACCOUNT MODAL ════════════════════════════════════ -->
    <div
      class="mo"
      id="acctMo"
      onclick="if (event.target === this) closeAcct();"
    >
      <div class="ms2" style="max-height: 65vh">
        <div class="pip"></div>
        <div class="shd">
          <div class="shd-left">
            <div class="shd-icon acct-icon">👤</div>
            <span class="sttl">Account</span>
          </div>
          <div class="sx" onclick="closeAcct()">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </div>
        </div>
        <div class="ap" id="acctPnl"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./app.js"></script>
    <script src="./ai_service.js"></script>
  </body>
</html>
