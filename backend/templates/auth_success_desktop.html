<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Signed in — ContextNote</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f5f5f7;color:#1a1a2e;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;
    }
    .card{
      background:#ffffff;border:1px solid #e2e2e8;
      border-radius:20px;padding:40px 28px;
      max-width:340px;width:100%;text-align:center;
      box-shadow:0 4px 24px rgba(0,0,0,0.06);
    }
    .check{
      width:60px;height:60px;border-radius:50%;
      background:#e8f5e9;border:1px solid #c8e6c9;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;
    }
    h2{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-0.3px;}
    .tagline{font-size:13px;color:#6b6b80;margin-bottom:16px;}
    .email-pill{
      display:inline-block;background:#f1f1f7;
      border:1px solid #e2e2e8;border-radius:20px;
      color:#4a4a60;font-size:12px;padding:6px 14px;margin-bottom:20px;
    }
    .body-text{font-size:13px;color:#6b6b80;line-height:1.65;margin-bottom:24px;}
    .cta{
      display:inline-block;background:#534AB7;color:#EEEDFE;
      font-size:13px;font-weight:600;padding:11px 28px;border-radius:30px;
    }
    .bar{height:3px;background:#e2e2e8;border-radius:2px;margin-top:20px;overflow:hidden;}
    .fill{height:100%;width:100%;background:#534AB7;border-radius:2px;
          animation:shrink 2s linear forwards;}
    @keyframes shrink{from{width:100%}to{width:0%}}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="#3B6D11" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>You're signed in</h2>
    <p class="tagline">Authenticated as</p>
    <div class="email-pill">{{ email }}</div>
    <p class="body-text">
      You can close this tab and return to the extension.<br>
      Everything is ready to go.
    </p>
    <div class="cta">Closing automatically…</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <script>setTimeout(()=>window.close(),2000);</script>
</body>
</html>
