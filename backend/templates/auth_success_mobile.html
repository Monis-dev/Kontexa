<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Signed in — ContextNote</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0f0f13;color:#f0eff8;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;
    }
    .card{
      background:#1a1a24;border:1px solid #2a2a38;
      border-radius:20px;padding:40px 28px;
      max-width:340px;width:100%;text-align:center;
    }
    .check{
      width:60px;height:60px;border-radius:50%;
      background:#1b2e1b;border:1px solid #2d4d2d;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;
    }
    h2{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-0.3px;}
    .tagline{font-size:13px;color:#8886a8;margin-bottom:16px;}
    .email-pill{
      display:inline-block;background:#252535;
      border:1px solid #32324a;border-radius:20px;
      color:#b8b6d0;font-size:12px;padding:6px 14px;margin-bottom:20px;
    }
    .body-text{font-size:13px;color:#8886a8;line-height:1.65;margin-bottom:24px;}
    .cta{
      display:inline-block;background:#534AB7;color:#EEEDFE;
      font-size:13px;font-weight:600;padding:11px 28px;border-radius:30px;
    }
    .bar{height:3px;background:#252535;border-radius:2px;margin-top:20px;overflow:hidden;}
    .fill{height:100%;width:100%;background:#534AB7;border-radius:2px;
          animation:shrink 2.5s linear forwards;}
    @keyframes shrink{from{width:100%}to{width:0%}}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="#4ade80" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>You're signed in</h2>
    <p class="tagline">Authenticated as</p>
    <div class="email-pill">{{ email }}</div>
    <p class="body-text">
      Switch back to the ContextNote app —<br>your notes will load automatically.
    </p>
    <div class="cta">You can close this tab</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <script>setTimeout(()=>window.close(),2500);</script>
</body>
</html>
