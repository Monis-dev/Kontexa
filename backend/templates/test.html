<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontexa Logo Export</title>
    <style>
      @import url("https://fonts.cdnfonts.com/css/neoneon");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #e8e8e8;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 60px;
        padding: 60px 40px;
        font-family: sans-serif;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 48px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .size-label {
        font-size: 13px;
        color: #555;
        text-align: center;
        margin-top: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── THE LOGO ── */
      .logo {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #5855e8;
        clip-path: url(#docClip);
        border-radius: 0;
        overflow: hidden;
        flex-shrink: 0;
      }

      /* Folded corner shadow */
      .logo::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 32%;
        height: 32%;
        background: #312e81;
        opacity: 0.6;
        z-index: 2;
      }

      .logo-k {
        font-family: "Neoneon", sans-serif;
        color: #fff;
        line-height: 1;
        position: relative;
        z-index: 1;
      }

      /* SIZE VARIANTS */
      .s128 {
        width: 128px;
        height: 128px;
        border-radius: 24px;
      }
      .s128 .logo-k {
        font-size: 80px;
        margin-top: 8px;
        margin-left: -6px;
      }

      .s64 {
        width: 64px;
        height: 64px;
        border-radius: 12px;
      }
      .s64 .logo-k {
        font-size: 40px;
        margin-top: 4px;
        margin-left: -3px;
      }

      .s48 {
        width: 48px;
        height: 48px;
        border-radius: 10px;
      }
      .s48 .logo-k {
        font-size: 30px;
        margin-top: 3px;
        margin-left: -2px;
      }

      .s32 {
        width: 32px;
        height: 32px;
        border-radius: 7px;
      }
      .s32 .logo-k {
        font-size: 20px;
        margin-top: 2px;
        margin-left: -2px;
      }

      .s16 {
        width: 16px;
        height: 16px;
        border-radius: 4px;
      }
      .s16 .logo-k {
        font-size: 10px;
        margin-top: 1px;
        margin-left: -1px;
      }

      /* HERO — for screenshotting */
      .s512 {
        width: 512px;
        height: 512px;
        border-radius: 96px;
      }
      .s512 .logo-k {
        font-size: 480px;
        margin-top: 90px;
        margin-left: -54px;
      }

      /* ── COLOR VARIANTS ── */

      /* Original indigo */
      .v-indigo {
        background: #5855e8;
      }
      .v-indigo::before {
        background: #312e81;
      }

      /* Midnight dark */
      .v-midnight {
        background: #1e1b4b;
      }
      .v-midnight::before {
        background: #0f0d2e;
      }

      /* Ocean teal */
      .v-ocean {
        background: #0891b2;
      }
      .v-ocean::before {
        background: #0e4f63;
      }

      /* Forest green */
      .v-forest {
        background: #059669;
      }
      .v-forest::before {
        background: #064e3b;
      }

      /* Sunset warm */
      .v-sunset {
        background: #ea580c;
      }
      .v-sunset::before {
        background: #7c2d12;
      }

      /* Rose */
      .v-rose {
        background: #e11d48;
      }
      .v-rose::before {
        background: #881337;
      }

      /* Slate */
      .v-slate {
        background: #475569;
      }
      .v-slate::before {
        background: #1e293b;
      }

      /* Pure black */
      .v-black {
        background: #111111;
      }
      .v-black::before {
        background: #000000;
      }

      /* Section titles */
      h2 {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #888;
        text-align: center;
        margin-bottom: 24px;
      }

      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .divider {
        width: 100%;
        max-width: 900px;
        height: 1px;
        background: #ccc;
      }
    </style>
  </head>
  <body>
    <!-- ── HERO — screenshot this one ── -->
    <div class="section">
      <h2>512 × 512 — Screenshot this for Photoshop</h2>
      <div class="logo-wrap">
        <div class="logo s512 v-indigo">
          <span class="logo-k">K</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ── SIZE PREVIEW ── -->
    <div class="section">
      <h2>All sizes — indigo</h2>
      <div class="row">
        <div class="logo-wrap">
          <div class="logo s128 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">128px</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s64 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">64px</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s48 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">48px</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s32 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">32px</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s16 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">16px</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ── COLOR VARIANTS ── -->
    <div class="section">
      <svg width="0" height="0" style="position: absolute">
        <defs>
          <clipPath id="docClip" clipPathUnits="objectBoundingBox">
            <path d="M0.12,0 H0.68 L1,0.32 V1 H0 V0.12 Q0,0 0.12,0 Z" />
          </clipPath>
        </defs>
      </svg>
      <h2>Color variants — 128px</h2>
      <div class="row">
        <div class="logo-wrap">
          <div class="logo s128 v-indigo"><span class="logo-k">K</span></div>
          <div class="size-label">Indigo</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-midnight"><span class="logo-k">K</span></div>
          <div class="size-label">Midnight</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-ocean"><span class="logo-k">K</span></div>
          <div class="size-label">Ocean</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-forest"><span class="logo-k">K</span></div>
          <div class="size-label">Forest</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-sunset"><span class="logo-k">K</span></div>
          <div class="size-label">Sunset</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-rose"><span class="logo-k">K</span></div>
          <div class="size-label">Rose</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-slate"><span class="logo-k">K</span></div>
          <div class="size-label">Slate</div>
        </div>
        <div class="logo-wrap">
          <div class="logo s128 v-black"><span class="logo-k">K</span></div>
          <div class="size-label">Black</div>
        </div>
      </div>
    </div>
  </body>
</html>
